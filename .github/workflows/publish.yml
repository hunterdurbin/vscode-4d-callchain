name: Publish Extension

# Tag a release (e.g. `git tag v0.1.16 && git push origin v0.1.16`) to:
#   1. build + package the lean .vsix,
#   2. attach it to a GitHub Release (download this to upload to the VS Code
#      Marketplace by hand at https://marketplace.visualstudio.com/manage),
#   3. optionally publish to Open VSX — only runs if the OVSX_TOKEN secret is set.
#
# The VS Code Marketplace half is manual because publishing via the vsce CLI
# requires an Azure DevOps PAT, which (as of Microsoft's Dec 2025 change) needs
# a paid Azure subscription to obtain. Open VSX is opt-in: it requires the
# Eclipse Foundation publisher agreement, so the step stays dormant until you
# add an OVSX_TOKEN repo secret.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release + upload the .vsix asset

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }} # mapped so the step `if` can test it
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The lean .vsix only needs @4d/core built — esbuild (run by vsce's
      # vscode:prepublish hook) bundles it and copies the committed
      # tree-sitter-fourd.wasm. The native parser-4d / language-server packages
      # are externalized and not shipped, so we skip the full `npm run build`.
      - name: Build core
        run: npm run build -w @4d/core

      - name: Package extension (lean)
        working-directory: packages/vscode-client
        run: npx @vscode/vsce package --no-dependencies

      - name: Resolve .vsix path
        id: vsix
        working-directory: packages/vscode-client
        run: echo "path=$(ls *.vsix)" >> "$GITHUB_OUTPUT"

      - name: Attach .vsix to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/vscode-client/*.vsix

      - name: Publish to Open VSX (only if OVSX_TOKEN is set)
        if: env.OVSX_TOKEN != ''
        working-directory: packages/vscode-client
        run: npx ovsx publish ${{ steps.vsix.outputs.path }} --pat "$OVSX_TOKEN"
